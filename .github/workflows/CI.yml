name: Cross Platform Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_DIR: ${{ github.workspace }}/build
  ARTIFACT_DIR: ${{ github.workspace }}/artifacts
  NATIVE_PROJECT_DIR: ${{ github.workspace }}/SimpleAudioPlayer.Native
  RUNTIME_DIR: ${{ github.workspace }}/SimpleAudioPlayer.Native/runtimes

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      package_version: ${{ steps.prepare.outputs.package_version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve version
      id: prepare
      shell: pwsh
      run: |
        [xml]$project = Get-Content -LiteralPath "${{ env.NATIVE_PROJECT_DIR }}/SimpleAudioPlayer.Native.csproj"
        $version = [string]$project.Project.PropertyGroup.Version

        if ([string]::IsNullOrWhiteSpace($version)) {
          throw "Version is missing in SimpleAudioPlayer.Native.csproj."
        }

        $parsedVersion = $null
        if (-not [Version]::TryParse($version, [ref]$parsedVersion)) {
          throw "Version must be a stable numeric SemVer version such as 2.0.0. Current value: '$version'."
        }

        $tagName = "v$version"
        $existingTag = git tag --list $tagName

        "package_version=$version" >> $env:GITHUB_OUTPUT
        "tag_name=$tagName" >> $env:GITHUB_OUTPUT

        if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
          Write-Host "Tag '$tagName' already exists. Nothing to publish."
          "should_release=false" >> $env:GITHUB_OUTPUT
          exit 0
        }

        $latestTag = git tag --list "v[0-9]*" --sort=-v:refname | Select-Object -First 1
        if (-not [string]::IsNullOrWhiteSpace($latestTag)) {
          $latestVersionText = $latestTag.Substring(1)
          $latestVersion = $null

          if ([Version]::TryParse($latestVersionText, [ref]$latestVersion) -and $parsedVersion -le $latestVersion) {
            throw "Version '$version' is not higher than the latest release tag '$latestTag'."
          }
        }

        Write-Host "Preparing release '$tagName'."
        "should_release=true" >> $env:GITHUB_OUTPUT

  windows:
    name: Windows
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ x86, x86_64 ]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MinGW
      run: |
        sudo apt-get update
        # 安装 MinGW-w64 工具链（包含 posix 线程和异常处理）
        sudo apt-get install -y \
          mingw-w64 \
          wine64

    - name: Configure
      run: |
        cmake -B $BUILD_DIR/windows-${{ matrix.arch }} -S ./Native \
          -DCMAKE_TOOLCHAIN_FILE=windows.toolchain.cmake \
          -DCROSS_ARCH=${{ matrix.arch }}

    - name: Build
      run: cmake --build $BUILD_DIR/windows-${{ matrix.arch }} --config Release -- -j$(nproc)

    - name: Package
      run: |
        mkdir -p $ARTIFACT_DIR/windows-${{ matrix.arch }}
        cp $BUILD_DIR/windows-${{ matrix.arch }}/bin/*.dll $ARTIFACT_DIR/windows-${{ matrix.arch }}/

    - uses: actions/upload-artifact@v4
      with:
        name: windows-${{ matrix.arch }}
        path: ${{env.ARTIFACT_DIR}}/windows-${{ matrix.arch }}/libaudio_player.dll

  linux:
    name: Linux
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm, aarch64, x86_64]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Cross Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        sudo apt-get install -y clang lld llvm

    - name: Configure
      run: |
        cmake -B $BUILD_DIR/linux-${{ matrix.arch }} -S ./Native \
          -DCMAKE_TOOLCHAIN_FILE=linux.toolchain.cmake \
          -DCROSS_ARCH=${{ matrix.arch }}

    - name: Build
      run: cmake --build $BUILD_DIR/linux-${{ matrix.arch }} -- -j$(nproc)

    - name: Package
      run: |
        mkdir -p $ARTIFACT_DIR/linux-${{ matrix.arch }}
        cp $BUILD_DIR/linux-${{ matrix.arch }}/lib/*.so $ARTIFACT_DIR/linux-${{ matrix.arch }}/
        ls $ARTIFACT_DIR/linux-${{ matrix.arch }}

    - uses: actions/upload-artifact@v4
      with:
        name: linux-${{ matrix.arch }}
        path: ${{env.ARTIFACT_DIR}}/linux-${{ matrix.arch }}/libaudio_player.so

  macos:
    name: macOS
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [ arm64, x86_64 ]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      run: |
        xcodebuild -version
        sudo xcodebuild -license accept
        xcrun --sdk macosx --show-sdk-path  # 验证 macOS SDK 路径

    - name: Configure
      run: |
        cmake -B $BUILD_DIR/macos-${{ matrix.arch }} -S ./Native \
          -DCMAKE_TOOLCHAIN_FILE=apple.toolchain.cmake \
          -DAPPLE_PLATFORM=MACOS \
          -DAPPLE_ARCH=${{ matrix.arch }}

    - name: Build
      run: |
        # 使用tee命令捕获完整构建日志
        cmake --build $BUILD_DIR/macos-${{ matrix.arch }} --config Release --
        
    - name: Create macos
      run: |
        mkdir -p $ARTIFACT_DIR/macos-${{ matrix.arch }}
        lipo -create -output $ARTIFACT_DIR/macos-${{ matrix.arch }}/libaudio_player.dylib \
          $BUILD_DIR/macos-${{ matrix.arch }}/lib/*.dylib

    - uses: actions/upload-artifact@v4
      with:
        name: macos-${{ matrix.arch }}
        path: ${{env.ARTIFACT_DIR}}/macos-${{ matrix.arch }}/libaudio_player.dylib

  ios:
    name: ios
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          xcodebuild -version
          sudo xcodebuild -license accept
          xcrun --sdk iphoneos --show-sdk-path  # 验证 iOS SDK 路径

      - name: Configure
        run: |
          cmake -B $BUILD_DIR/ios -S ./Native \
            -DCMAKE_TOOLCHAIN_FILE=apple.toolchain.cmake \
            -DAPPLE_PLATFORM=IOS \
            -DAPPLE_ARCH=arm64

      - name: Build
        run: |
          # 使用tee命令捕获完整构建日志
          cmake --build $BUILD_DIR/ios --config Release -- 

      - name: Create ios
        run: |
          mkdir -p $ARTIFACT_DIR/ios 
          lipo -create -output $ARTIFACT_DIR/ios/libaudio_player.dylib \
            $BUILD_DIR/ios/lib/*.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: ${{env.ARTIFACT_DIR}}/ios/libaudio_player.dylib

  android:
    name: Android
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86_64]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Cross Tools
      run: |
        sudo apt-get update
        sudo apt-get install ninja-build

    - name: Setup NDK
      uses: android-actions/setup-android@v2

    - name: Configure
      run: |
        cmake -B $BUILD_DIR/android-${{ matrix.abi }} -S ./Native \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
          -DCROSS_TARGET=Android \
          -DCROSS_ARCH=${{ matrix.abi }} \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_NATIVE_API_LEVEL=21

    - name: Build
      run: cmake --build $BUILD_DIR/android-${{ matrix.abi }}  -- -j$(nproc)

    - name: Package
      run: |
        mkdir -p $ARTIFACT_DIR/android-${{ matrix.abi }}
        cp $BUILD_DIR/android-${{ matrix.abi }}/lib/*.so $ARTIFACT_DIR/android-${{ matrix.abi }}/

    - name: Verify 16 KB ELF alignment
      run: |
        readelf="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
        so_file="$ARTIFACT_DIR/android-${{ matrix.abi }}/libaudio_player.so"
        "$readelf" -lW "$so_file" | awk '
          $1 == "LOAD" {
            if ($NF != "0x4000") {
              printf("Invalid LOAD alignment for %s: %s\n", file, $NF)
              exit 1
            }
            found = 1
          }
          END {
            if (!found) {
              printf("No LOAD segment found for %s\n", file)
              exit 1
            }
          }
        ' file="$so_file"

    - uses: actions/upload-artifact@v4
      with:
        name: android-${{ matrix.abi }}
        path: ${{env.ARTIFACT_DIR}}/android-${{ matrix.abi }}/libaudio_player.so

  package_nuget:
    name: Package NuGet
    needs: [prepare, windows, linux, macos, ios, android]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
         path: ${{env.ARTIFACT_DIR}}
    - name: Create Runtime
      run: |
        # 创建标准runtime目录结构
        mkdir -p ${{env.RUNTIME_DIR}}/win-x64/native
        mkdir -p ${{env.RUNTIME_DIR}}/win-x86/native
        mkdir -p ${{env.RUNTIME_DIR}}/linux-x64/native
        mkdir -p ${{env.RUNTIME_DIR}}/linux-arm/native
        mkdir -p ${{env.RUNTIME_DIR}}/linux-arm64/native
        mkdir -p ${{env.RUNTIME_DIR}}/osx-x64/native
        mkdir -p ${{env.RUNTIME_DIR}}/osx-arm64/native
        mkdir -p ${{env.RUNTIME_DIR}}/ios-arm64/native
        mkdir -p ${{env.RUNTIME_DIR}}/android-arm/native
        mkdir -p ${{env.RUNTIME_DIR}}/android-x64/native
        mkdir -p ${{env.RUNTIME_DIR}}/android-arm64/native
        
        # Windows
        cp ${{env.ARTIFACT_DIR}}/windows-x86_64/libaudio_player.dll ${{env.RUNTIME_DIR}}/win-x64/native/
        cp ${{env.ARTIFACT_DIR}}/windows-x86/libaudio_player.dll ${{env.RUNTIME_DIR}}/win-x86/native/

        # Linux
        cp ${{env.ARTIFACT_DIR}}/linux-x86_64/libaudio_player.so ${{env.RUNTIME_DIR}}/linux-x64/native/
        cp ${{env.ARTIFACT_DIR}}/linux-arm/libaudio_player.so ${{env.RUNTIME_DIR}}/linux-arm/native/
        cp ${{env.ARTIFACT_DIR}}/linux-aarch64/libaudio_player.so ${{env.RUNTIME_DIR}}/linux-arm64/native/

        # macOS
        cp ${{env.ARTIFACT_DIR}}/macos-x86_64/libaudio_player.dylib ${{env.RUNTIME_DIR}}/osx-x64/native/
        cp ${{env.ARTIFACT_DIR}}/macos-arm64/libaudio_player.dylib ${{env.RUNTIME_DIR}}/osx-arm64/native/

        # iOS
        cp ${{env.ARTIFACT_DIR}}/ios/libaudio_player.dylib ${{env.RUNTIME_DIR}}/ios-arm64/native/

        # Android
        cp ${{env.ARTIFACT_DIR}}/android-arm64-v8a/libaudio_player.so ${{env.RUNTIME_DIR}}/android-arm64/native/
        cp ${{env.ARTIFACT_DIR}}/android-armeabi-v7a/libaudio_player.so ${{env.RUNTIME_DIR}}/android-arm/native/
        cp ${{env.ARTIFACT_DIR}}/android-x86_64/libaudio_player.so ${{env.RUNTIME_DIR}}/android-x64/native/
         
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Pack NuGet Package
      run: dotnet pack "${{ env.NATIVE_PROJECT_DIR }}/SimpleAudioPlayer.Native.csproj" -c Release -p:PackageId=SimpleAudioPlayer.Native -o "${{ env.NATIVE_PROJECT_DIR }}/nupkg"

    - name: Verify NuGet Package Contents
      run: |
        package=$(find "${{ env.NATIVE_PROJECT_DIR }}/nupkg" -name '*.nupkg' -print -quit)
        test -n "$package"
        unzip -l "$package"
        for file in \
          runtimes/win-x64/native/libaudio_player.dll \
          runtimes/win-x86/native/libaudio_player.dll \
          runtimes/linux-x64/native/libaudio_player.so \
          runtimes/linux-arm/native/libaudio_player.so \
          runtimes/linux-arm64/native/libaudio_player.so \
          runtimes/osx-x64/native/libaudio_player.dylib \
          runtimes/osx-arm64/native/libaudio_player.dylib \
          runtimes/ios-arm64/native/libaudio_player.dylib \
          runtimes/android-arm/native/libaudio_player.so \
          runtimes/android-arm64/native/libaudio_player.so \
          runtimes/android-x64/native/libaudio_player.so; do
          unzip -l "$package" "$file" | grep -q "$file"
        done

    - name: Publish NuGet Package
      run: |
        for package in "${{ env.NATIVE_PROJECT_DIR }}"/nupkg/*.nupkg; do
          dotnet nuget push "$package" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
        done

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
        TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
      shell: bash
      run: |
        mapfile -t assets < <(find "${{ env.NATIVE_PROJECT_DIR }}/nupkg" -type f | sort)

        if [ ${#assets[@]} -eq 0 ]; then
          echo "No release assets were produced."
          exit 1
        fi

        gh release create "$TAG_NAME" "${assets[@]}" \
          --target "$GITHUB_SHA" \
          --title "SimpleAudioPlayer.Native $PACKAGE_VERSION" \
          --generate-notes
